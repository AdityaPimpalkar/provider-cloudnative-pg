---
# See more details at https://k3d.io/v5.3.0/usage/configfile/
apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: provider-cloudnative-pg-test
servers: 1
agents: 3
image: rancher/k3s:v1.33.2-k3s1
registries:
  create:
    name: k3d-provider-cloudnative-pg-registry
    host: "0.0.0.0"
    hostPort: "5005"
options:
  k3d:
    wait: true
    disableLoadbalancer: true
  k3s:
    extraArgs:
      - arg: "--disable=traefik,metrics-server,servicelb"
        nodeFilters:
          - server:*
      - arg: "--disable-network-policy"
        nodeFilters:
          - server:*
