                        label: CPU requests
                        step: 1
                      path: spec.components.engine.resources.requests.cpu
                      uiType: number
                      validation:
                        min: 0.1
                        required: true
                    disk:
                      fieldParams:
                        badge: Gi
                        badgeToApi: true
                        defaultValue: 25
                        label: Disk
                      path: spec.components.engine.storage.size
                      uiType: number
                      validation:
                        int: true
                        min: 1
                        modes:
                          edit:
                            celExpressions:
                              - celExpr: spec.components.engine.storage.size >= original.spec.components.engine.storage.size
                                message: Disk size cannot be decreased
                        required: true
                    memory-limits:
                      fieldParams:
                        badge: Gi
                        badgeToApi: true
                        defaultValue: 4
                        label: Memory limits
                        step: 0.1
                      path: spec.components.engine.resources.limits.memory
                      uiType: number
                      validation:
                        min: 0.1
                        required: true
                    memory-requests:
                      fieldParams:
                        badge: Gi
                        badgeToApi: true
                        defaultValue: 4
                        label: Memory requests
                        step: 0.1
                      path: spec.components.engine.resources.requests.memory
                      uiType: number
                      validation:
                        min: 0.1
                        required: true
                  componentsOrder:
