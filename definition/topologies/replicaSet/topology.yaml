# ReplicaSet topology definition.
# This file defines both the structural topology and its UI rendering.
#
# config.components: Which components are used and their defaults.
# config.configSchema: Reference a Go type for custom topology config fields.
# ui: Rendering hints for the frontend form.
#
# See github.com/openeverest/provider-sdk/blob/main/PROVIDER_DEVELOPMENT.md
# for detailed guidance.

config:
  components:
    engine:
      defaults:
        replicas: 3
    backupAgent:
      optional: true
    monitoring:
      optional: true
ui:
  sections:
    databaseVersion:
      label: "Database version"
      description: "Provide the information about the database version you want to use."
      components:
        version:
          uiType: select
          path: spec.version
          fieldParams:
            label: "Database version"
            optionsPath: spec.versions
            optionsPathConfig:
              labelPath: "name"
              valuePath: "name"
            modes:
              edit:
                disabled: true
              restore:
                disabled: true
          validation:
            required: true
    resources:
      label: "Resources details"
      description: "Configure the resources your new database will have access to."
      components:
        nodes:
          uiType: group
          components:
            numberOfnodes:
              path: "spec.components.engine.replicas"
              uiType: number
              fieldParams:
                label: "Number of nodes"
                defaultValue: 3
              validation:
                required: true
                min: 1
                int: true
                celExpressions:
                  - celExpr: "spec.components.engine.replicas % 2 == 1"
                    message: "The number of nodes must be odd"
                modes:
                  edit:
                    celExpressions:
                      - celExpr: "!(spec.components.engine.replicas == 1 && original.spec.components.engine.replicas > 1)"
                        message: "Cannot scale down to a single node"

            resources-limits:
              uiType: group
              groupType: line
              components:
                cpu-limits:
                  path:
                    - "spec.components.engine.resources.limits.cpu"
                    - "spec.components.engine.resources.requests.cpu"
                  uiType: number
                  fieldParams:
                    label: "CPU"
                    defaultValue: 1
                    step: 1
                  validation:
                    min: 0.6
                    required: true
                memory-limits:
                  path:
                    - "spec.components.engine.resources.limits.memory"
                    - "spec.components.engine.resources.requests.memory"
                  uiType: number
                  fieldParams:
                    label: "Memory"
                    defaultValue: 4
                    step: 0.1
                    badge: "Gi"
                    badgeToApi: true
                  validation:
                    min: 0.512
                    required: true
                disk:
                  path: "spec.components.engine.storage.size"
                  uiType: number
                  fieldParams:
                    label: "Disk"
                    defaultValue: 25
                    badge: "Gi"
                    badgeToApi: true
                  validation:
                    min: 1
                    int: true
                    required: true
                    modes:
                      edit:
                        celExpressions:
                          - celExpr: "spec.components.engine.storage.size >= original.spec.components.engine.storage.size"
                            message: "Disk size cannot be decreased"
          componentsOrder:
            - numberOfnodes
            - resources-limits
            - disk
    advanced:
      label: "Advanced configuration"
      description: "Configure advanced settings for your database"
      components:
        storageClass:
          uiType: select
          path: spec.components.engine.storage.storageClass
          fieldParams:
            label: "Storage class"
            modes:
              edit:
                disabled: true
              restore:
                disabled: true
          validation:
            required: true
          dataSource:
            provider: storageClasses
        configuration:
          uiType: text
          path: spec.components.engine.customSpec.postgresql.parameters
          fieldParams:
            label: "Engine configuration"
            placeholder: |2
              operationProfiling:
                mode: slowOps
                slowOpThresholdMs: 200
            multiline: true
            minRows: 3
            maxRows: 8
      componentsOrder:
        - storageClass
        - configuration
  sectionsOrder:
    - databaseVersion
    - resources
    - advanced
